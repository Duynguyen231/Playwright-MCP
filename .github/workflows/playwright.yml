name: Playwright Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      test_tag:
        description: "Select tests to run by tag"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - "@smoke"
          - "@integration"
          - "@regression"
          - "@e2e"
          - "@visual"
          - "@visual-user"
          - "@critical"
          - "@problem-user"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Use playwright official docker image to speed up browser startup and avoid installing browsers on each runner
    container:
      image: mcr.microsoft.com/playwright:v1.57.0
      options: --user 1001
    # Run 4 shards in parallel (matrix), each shard will run with
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          cat > .env << EOF
          SAUCE_DEMO_URL=${{ secrets.SAUCE_DEMO_URL || 'https://www.saucedemo.com/' }}
          SAUCE_PASSWORD=${{ secrets.SAUCE_PASSWORD || 'secret_sauce' }}
          SAUCE_USERNAME_STANDARD=${{ secrets.SAUCE_USERNAME_STANDARD || 'standard_user' }}
          SAUCE_USERNAME_LOCKED=${{ secrets.SAUCE_USERNAME_LOCKED || 'locked_out_user' }}
          SAUCE_USERNAME_PROBLEM=${{ secrets.SAUCE_USERNAME_PROBLEM || 'problem_user' }}
          SAUCE_USERNAME_PERFORMANCE=${{ secrets.SAUCE_USERNAME_PERFORMANCE || 'performance_glitch_user' }}
          SAUCE_USERNAME_ERROR=${{ secrets.SAUCE_USERNAME_ERROR || 'error_user' }}
          SAUCE_USERNAME_VISUAL=${{ secrets.SAUCE_USERNAME_VISUAL || 'visual_user' }}
          EOF

      - name: Run Playwright tests
        run: |
          if [ "${{ github.event.inputs.test_tag }}" = "all" ] || [ -z "${{ github.event.inputs.test_tag }}" ]; then
            npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          else
            npx playwright test --grep "${{ github.event.inputs.test_tag }}" --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          fi
        continue-on-error: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shardIndex }}
          path: test-results/
          retention-days: 30

  merge-reports:
    # Merge all shard reports into one
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: playwright-report-*

      - name: Merge reports
        run: |
          mkdir -p ./merged-results
          # Copy all blob report zips to current directory
          cp all-reports/playwright-report-1/* . 2>/dev/null || true
          cp all-reports/playwright-report-2/* . 2>/dev/null || true
          cp all-reports/playwright-report-3/* . 2>/dev/null || true
          cp all-reports/playwright-report-4/* . 2>/dev/null || true
          echo "Blob reports:"
          ls -la *.zip 2>/dev/null || echo "No .zip files found"
          # Merge reports - merge-reports finds .zip files in current dir and outputs to specified dir
          npx playwright merge-reports --reporter html --output ./merged-results
        continue-on-error: true

      - name: Upload Report to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./merged-results

  deploy:
    if: always()
    needs: merge-reports
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  comment-pr:
    if: github.event_name == 'pull_request' && always()
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR with Test Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pageUrl = '${{ needs.deploy.outputs.page_url }}';
            const reportUrl = pageUrl ? `[📊 View Full Test Report](${pageUrl})` : 'Check GitHub Actions Artifacts tab';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎭 Playwright Test Results\n\n✅ Tests completed!\n\n${reportUrl}`
            });
        continue-on-error: true

