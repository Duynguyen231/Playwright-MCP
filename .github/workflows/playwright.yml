name: Playwright Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      test_tag:
        description: "Select tests to run by tag"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - "@smoke"
          - "@integration"
          - "@regression"
          - "@e2e"
          - "@visual"
          - "@visual-user"
          - "@critical"
          - "@problem-user"

permissions:
  contents: read

jobs:
  # ─── Single job: Run sharded tests in Playwright Docker container ──────────
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          cat > .env << EOF
          SAUCE_DEMO_URL=${{ secrets.SAUCE_DEMO_URL || 'https://www.saucedemo.com/' }}
          SAUCE_PASSWORD=${{ secrets.SAUCE_PASSWORD || 'secret_sauce' }}
          SAUCE_USERNAME_STANDARD=${{ secrets.SAUCE_USERNAME_STANDARD || 'standard_user' }}
          SAUCE_USERNAME_LOCKED=${{ secrets.SAUCE_USERNAME_LOCKED || 'locked_out_user' }}
          SAUCE_USERNAME_PROBLEM=${{ secrets.SAUCE_USERNAME_PROBLEM || 'problem_user' }}
          SAUCE_USERNAME_PERFORMANCE=${{ secrets.SAUCE_USERNAME_PERFORMANCE || 'performance_glitch_user' }}
          SAUCE_USERNAME_ERROR=${{ secrets.SAUCE_USERNAME_ERROR || 'error_user' }}
          SAUCE_USERNAME_VISUAL=${{ secrets.SAUCE_USERNAME_VISUAL || 'visual_user' }}
          EOF

      - name: Run Playwright tests
        env:
          TEST_TAG: ${{ github.event.inputs.test_tag }}
        run: |
          if [ "$TEST_TAG" = "all" ] || [ -z "$TEST_TAG" ]; then
            npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          else
            npx playwright test --grep "$TEST_TAG" --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          fi
        continue-on-error: true

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

  # ─── Merge shard reports into one HTML report ───────────────────────────────
  merge-reports:
    if: ${{ !cancelled() }}
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    container:
      image: node:lts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore node_modules from cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 14

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ !cancelled() }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          destination_dir: reports/${{ github.run_id }}/attempt-${{ github.run_attempt }}

      - name: Comment PR with report link
        uses: actions/github-script@v7
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          script: |
            const repoName = context.repo.repo;
            const repoOwner = context.repo.owner;
            const runId = context.runId;
            const runAttempt = process.env.RUN_ATTEMPT;

            const reportUrl = `https://${repoOwner}.github.io/${repoName}/reports/${runId}/attempt-${runAttempt}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Test Report Available\n\n✅ Playwright test report has been generated and deployed.\n\n[**Click here to view the full test report**](${reportUrl})\n\nReport ID: ${runId} (Attempt: ${runAttempt})`
            });
