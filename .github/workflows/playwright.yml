name: Playwright Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      test_tag:
        description: "Select tests to run by tag"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - "@smoke"
          - "@integration"
          - "@regression"
          - "@e2e"
          - "@visual"
          - "@visual-user"
          - "@critical"
          - "@problem-user"

permissions:
  contents: write # Required: push to gh-pages branch
  pull-requests: write # Required: post comments on PRs

jobs:
  # ─── Single job: Run sharded tests in Playwright Docker container ──────────
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          cat > .env << EOF
          SAUCE_DEMO_URL=${{ secrets.SAUCE_DEMO_URL || 'https://www.saucedemo.com/' }}
          SAUCE_PASSWORD=${{ secrets.SAUCE_PASSWORD || 'secret_sauce' }}
          SAUCE_USERNAME_STANDARD=${{ secrets.SAUCE_USERNAME_STANDARD || 'standard_user' }}
          SAUCE_USERNAME_LOCKED=${{ secrets.SAUCE_USERNAME_LOCKED || 'locked_out_user' }}
          SAUCE_USERNAME_PROBLEM=${{ secrets.SAUCE_USERNAME_PROBLEM || 'problem_user' }}
          SAUCE_USERNAME_PERFORMANCE=${{ secrets.SAUCE_USERNAME_PERFORMANCE || 'performance_glitch_user' }}
          SAUCE_USERNAME_ERROR=${{ secrets.SAUCE_USERNAME_ERROR || 'error_user' }}
          SAUCE_USERNAME_VISUAL=${{ secrets.SAUCE_USERNAME_VISUAL || 'visual_user' }}
          EOF

      - name: Run Playwright tests
        env:
          TEST_TAG: ${{ github.event.inputs.test_tag }}
        run: |
          if [ "$TEST_TAG" = "all" ] || [ -z "$TEST_TAG" ]; then
            npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          else
            npx playwright test --grep "$TEST_TAG" --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
          fi
        continue-on-error: true

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

  # ─── Merge shard reports into one HTML report ───────────────────────────────
  merge-reports:
    if: ${{ !cancelled() }}
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    container:
      image: node:lts
    # Expose the final URL as a job output so other steps can reference it
    outputs:
      report_url: ${{ steps.set-url.outputs.report_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        # Always run npm ci — don't rely solely on cache in a fresh container
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 14

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
          # Each run gets its own folder, so old reports are never overwritten
          destination_dir: reports/${{ github.run_id }}/attempt-${{ github.run_attempt }}

      - name: Set report URL output
        id: set-url
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_id }}/attempt-${{ github.run_attempt }}"
          echo "report_url=${REPORT_URL}" >> "$GITHUB_OUTPUT"
          echo "Report deployed to: ${REPORT_URL}"

      - name: Add report link to job summary
        run: |
          echo "## ✅ Playwright Test Report Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**[🔗 Click here to view the test report](${{ steps.set-url.outputs.report_url }})**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run: \`${{ github.run_id }}\` | Attempt: \`${{ github.run_attempt }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with report link
        uses: actions/github-script@v7
        # Only runs on pull_request events; skipped for push / workflow_dispatch
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        with:
          script: |
            const reportUrl = "${{ steps.set-url.outputs.report_url }}";

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "## 📊 Playwright Test Report",
                "",
                "The test report has been deployed to GitHub Pages.",
                "",
                `**[▶ Click here to view the full report](${reportUrl})**`,
                "",
                `> Run \`${context.runId}\` · Attempt \`${{ github.run_attempt }}\``
              ].join("\n")
            });
